<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – Jadwal Kerja</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
  body{background:#0d1117;color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-top:54px;padding-bottom:24px}

  /* Loading overlay */
  #loadingOverlay{
    position:fixed;inset:0;background:#0d1117;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:14px;color:#8b93a7;z-index:9999;gap:10px;
  }
  #loadingOverlay .spinner{
    width:28px;height:28px;border:3px solid #30363d;
    border-top-color:#3b82f6;border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Topbar */
  .topbar{
    position:fixed;top:0;left:0;right:0;height:46px;
    background:#161b22;border-bottom:1px solid #30363d;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;z-index:100;
  }
  .topbar-title{font-size:13px;font-weight:700;color:#fff}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .topbar-user{font-size:11px;color:#8b93a7;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .logout-btn{
    height:26px;padding:0 10px;border:none;border-radius:6px;
    background:#3d1f1f;color:#fca5a5;font-size:10px;font-weight:700;
    cursor:pointer;transition:0.15s;
  }
  .logout-btn:hover{background:#5a2d2d}

  /* Wrapper */
  .wrapper{width:100%;max-width:390px;padding:6px 4px 4px}

  /* Tab menu */
  .menu{
    display:flex;gap:3px;margin-bottom:6px;
    background:#161b22;border:1px solid #30363d;
    border-radius:8px;padding:4px;flex-wrap:wrap;
  }
  .menu button{
    flex:1;min-width:60px;height:28px;border:none;border-radius:6px;
    background:#21262d;color:#8b93a7;
    font-size:8px;font-weight:700;letter-spacing:0.3px;
    cursor:pointer;transition:0.15s;white-space:nowrap;
  }
  .menu button:hover{background:#2d333b;color:white}
  .menu button.active-tab{background:#1f6feb;color:white}

  /* Pages */
  .page{display:none;margin-top:4px}
  .page.active{display:block}

  /* Setting forms */
  .setting-list{display:flex;flex-direction:column;gap:4px}
  .setting-item{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px}
  .setting-item h3{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#8b93a7;margin-bottom:5px}
  .setting-item input[type="text"],
  .setting-item input[type="date"]{
    width:100%;height:26px;background:#0d1117;border:1px solid #30363d;
    border-radius:4px;color:white;padding:0 8px;font-size:11px;outline:none;
  }
  .setting-item input:focus{border-color:#3b82f6}

  /* Jadwal section */
  .jadwal-container{display:flex;flex-direction:column;gap:4px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:6px;overflow:hidden}
  .card-topbar{
    height:22px;background:#21262d;border-bottom:1px solid #30363d;
    display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;
  }
  .card-body{padding:4px 4px 2px}
  .row{
    display:grid;grid-template-columns:44px 1fr;
    align-items:center;gap:3px;margin-bottom:3px;
  }
  .row:last-child{margin-bottom:0}
  .hari-lbl{font-size:7px;font-weight:700;text-transform:uppercase;color:#e5e7eb}
  .hari-lbl.off-day{color:#fca5a5}
  .hari-lbl.off-day::after{
    content:"";width:5px;height:5px;border-radius:50%;
    background:maroon;display:inline-block;margin-left:3px;vertical-align:middle;
  }
  .shift-group{display:flex;gap:2px}
  .shift-group input[type="radio"]{display:none}
  .shift-group label{
    flex:1;height:18px;border-radius:3px;
    background:#21262d;border:1px solid #30363d;
    display:flex;align-items:center;justify-content:center;
    font-size:6.5px;font-weight:600;cursor:pointer;user-select:none;
    transition:0.1s;color:#8b93a7;
  }
  .shift-group label:hover{background:#2d333b;color:white}
  .shift-group input[type="radio"]:checked + label{background:#238636;border-color:#2ea043;color:white}
  .shift-group input[value="OFF"]:checked + label{background:maroon;border-color:#9b1c1c;color:#fca5a5}

  /* Hari libur checkboxes */
   .libur-group{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px}
  .libur-group label{
    height:26px;padding:0 2px;background:#21262d;border:1px solid #30363d;
    border-radius:4px;display:flex;align-items:center;justify-content:center;
    gap:3px;font-size:7px;cursor:pointer;transition:0.15s;
  }
  .libur-group label:hover{border-color:#3b82f6}
  .libur-group input[type="checkbox"]{
    width:10px;height:10px;accent-color:#2563eb;cursor:pointer;flex-shrink:0;
  }
  .libur-group input[type="checkbox"]:checked + span{color:#93c5fd}

  /* Save buttons */
  .save-btn{
    width:100%;height:30px;margin-top:6px;
    border:none;border-radius:6px;background:#238636;
    color:white;font-size:9px;font-weight:700;
    cursor:pointer;transition:0.15s;letter-spacing:0.5px;
  }
  .save-btn:hover{background:#2ea043}
  .save-btn:disabled{opacity:0.5;cursor:not-allowed}
  .save-btn.success{background:#1d4ed8}

  @media(min-width:480px){.wrapper{max-width:460px}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <span>Memeriksa sesi login...</span>
</div>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-title">⚙️ Admin Panel</div>
  <div class="topbar-right">
    <span class="topbar-user" id="userEmail">—</span>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="wrapper">

  <!-- Tab buttons -->
  <div class="menu">
    <button id="tab-jam"     onclick="showPage('jamPage','tab-jam')">Setting Jam</button>
    <button id="tab-tanggal" onclick="showPage('tanggalPage','tab-tanggal')">Atur Tanggal</button>
    <button id="tab-jadwal"  onclick="showPage('jadwalPage','tab-jadwal')">Atur Jadwal</button>
    <button id="tab-libur"   onclick="showPage('liburPage','tab-libur')">Hari Libur</button>
  </div>

  <!-- ── TAB 1: Setting Jam Shift ───────────────────────── -->
  <div class="page" id="jamPage">
    <div class="setting-list">
      <div class="setting-item">
        <h3>Shift 1</h3>
        <input type="text" id="jam-S1" placeholder="Contoh: 08:00 - 16:00" />
      </div>
      <div class="setting-item">
        <h3>Shift 2</h3>
        <input type="text" id="jam-S2" placeholder="Contoh: 16:00 - 00:00" />
      </div>
      <div class="setting-item">
        <h3>Shift 2 (OFF 1) — khusus hari libur</h3>
        <input type="text" id="jam-S2O" placeholder="Contoh: 16:00 - 00:00" />
      </div>
      <div class="setting-item">
        <h3>Shift 3</h3>
        <input type="text" id="jam-S3" placeholder="Contoh: 00:00 - 08:00" />
      </div>
    </div>
    <button class="save-btn" id="saveJamBtn" onclick="saveJam()">SIMPAN JAM SHIFT</button>
  </div>

  <!-- ── TAB 2: Atur Tanggal & Judul ───────────────────── -->
  <div class="page" id="tanggalPage">
    <div class="setting-list">
      <div class="setting-item">
        <h3>Judul Halaman</h3>
        <input type="text" id="judulInput" placeholder="Contoh: Jadwal Kerja Alhambra" />
      </div>
      <div class="setting-item">
        <h3>Tanggal Mulai (harus hari Senin)</h3>
        <input type="date" id="tanggalMulai" />
      </div>
    </div>
    <button class="save-btn" id="saveTanggalBtn" onclick="saveTanggal()">SIMPAN TANGGAL & JUDUL</button>
  </div>

  <!-- ── TAB 3: Atur Jadwal ─────────────────────────────── -->
  <div class="page" id="jadwalPage">
    <div class="jadwal-container" id="jadwalContainer"></div>
    <button class="save-btn" id="saveJadwalBtn" onclick="saveJadwal()">SIMPAN JADWAL</button>
  </div>

  <!-- ── TAB 4: Hari Libur ──────────────────────────────── -->
  <div class="page" id="liburPage">
    <div class="setting-list">
      <div class="setting-item">
        <h3>Tandai Hari Libur</h3>
        <p style="font-size:8px;color:#8b93a7;margin-bottom:6px">
          Pilih untuk mengatur hari libur.
        </p>
        <div class="libur-group">
          <label><input type="checkbox" class="libur-cb" value="Senin"   /><span>SENIN</span></label>
          <label><input type="checkbox" class="libur-cb" value="Selasa"  /><span>SELASA</span></label>
          <label><input type="checkbox" class="libur-cb" value="Rabu"    /><span>RABU</span></label>
          <label><input type="checkbox" class="libur-cb" value="Kamis"   /><span>KAMIS</span></label>
          <label><input type="checkbox" class="libur-cb" value="Jumat"   /><span>JUMAT</span></label>
          <label><input type="checkbox" class="libur-cb" value="Sabtu"   /><span>SABTU</span></label>
          <label><input type="checkbox" class="libur-cb" value="Minggu"  /><span>MINGGU</span></label>
        </div>
      </div>
    </div>
    <button class="save-btn" id="saveLiburBtn" onclick="saveLibur()">SIMPAN HARI LIBUR</button>
  </div>

</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCoO_viP4_7CjDRJIK-f4wOfkgZgM-2ab8",
    authDomain:        "jadwal-alhambra.firebaseapp.com",
    databaseURL:       "https://jadwal-alhambra-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "jadwal-alhambra",
    storageBucket:     "jadwal-alhambra.firebasestorage.app",
    messagingSenderId: "268642441303",
    appId:             "1:268642441303:web:0e851cdd27daf4d1a36b12"
  };
  // ═══════════════════════════════════════════════════════════

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  // ─── Konfigurasi karyawan ─────
  const KARYAWAN  = ["ICHA", "HIKMAH", "SYDNEY"];
  const HARI_LIST = ["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu","Minggu"];

  let hariLibur    = ["Kamis","Jumat","Minggu"];
  let currentJadwal = null;

  // ─── Auth: cek login, redirect kalau belum login ──────────
  onAuthStateChanged(auth, async user => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    document.getElementById("userEmail").textContent = user.email;
    await loadConfig();
    renderJadwal();
    showPage("jamPage", "tab-jam");
    document.getElementById("loadingOverlay").style.display = "none";
  });

  // ─── Load seluruh config dari Firebase ────────────────────
  async function loadConfig() {
    try {
      const snap = await get(ref(db, "config"));
      if (!snap.exists()) return;
      const cfg = snap.val();

      // Populate jam
      if (cfg.shifts) {
        document.getElementById("jam-S1").value  = cfg.shifts.S1?.jam  || "";
        document.getElementById("jam-S2").value  = cfg.shifts.S2?.jam  || "";
        document.getElementById("jam-S2O").value = cfg.shifts.S2O?.jam || "";
        document.getElementById("jam-S3").value  = cfg.shifts.S3?.jam  || "";
      }

      // Populate tanggal + judul
      if (cfg.tanggalMulai)
        document.getElementById("tanggalMulai").value = cfg.tanggalMulai;
      if (cfg.tampilan?.judul)
        document.getElementById("judulInput").value = cfg.tampilan.judul;

      // Populate hari libur
      if (cfg.hariLibur) {
        hariLibur = Array.isArray(cfg.hariLibur)
          ? cfg.hariLibur
          : Object.values(cfg.hariLibur);
      }
      document.querySelectorAll(".libur-cb").forEach(cb => {
        cb.checked = hariLibur.includes(cb.value);
      });

      // Simpan jadwal untuk pre-select radio
      if (cfg.jadwal) currentJadwal = cfg.jadwal;

    } catch (e) {
      console.error("Gagal load config:", e);
    }
  }

  // ─── Render tab Atur Jadwal ───────────────────────────────
  function renderJadwal() {
    const container = document.getElementById("jadwalContainer");
    container.innerHTML = "";

    KARYAWAN.forEach(nama => {
      let html = `
        <div class="card">
          <div class="card-topbar">${nama}</div>
          <div class="card-body">`;

      HARI_LIST.forEach((hari, hIdx) => {
        const isLibur = hariLibur.includes(hari);

        const shiftOpts = isLibur
          ? [{key:"S1",label:"S1"},{key:"S2O",label:"S2 (OFF 1)"},{key:"OFF",label:"OFF"}]
          : [{key:"S1",label:"S1"},{key:"S2",label:"S2"},{key:"S3",label:"S3"},{key:"OFF",label:"OFF"}];

        // Ambil nilai tersimpan
        const savedArr = currentJadwal?.[nama];
        const savedVal = savedArr
          ? (Array.isArray(savedArr) ? savedArr[hIdx] : Object.values(savedArr)[hIdx])
          : null;

        html += `
          <div class="row">
            <div class="hari-lbl ${isLibur ? "off-day" : ""}">${hari}</div>
            <div class="shift-group">`;

        shiftOpts.forEach((s, sIdx) => {
          const id      = `r_${nama}_${hIdx}_${sIdx}`;
          const checked = savedVal === s.key ? "checked" : "";
          html += `
            <input type="radio" name="r_${nama}_${hIdx}" id="${id}" value="${s.key}" ${checked}>
            <label for="${id}">${s.label}</label>`;
        });

        html += `</div></div>`;
      });

      html += `</div></div>`;
      container.innerHTML += html;
    });
  }

  // ─── Helper: tombol loading state ─────────────────────────
  async function withLoading(btnId, originalLabel, fn) {
    const btn = document.getElementById(btnId);
    btn.textContent = "Menyimpan...";
    btn.disabled    = true;
    btn.classList.remove("success");
    try {
      await fn();
      btn.textContent = "✓ Berhasil Disimpan!";
      btn.classList.add("success");
      setTimeout(() => {
        btn.textContent = originalLabel;
        btn.classList.remove("success");
        btn.disabled    = false;
      }, 2500);
    } catch (e) {
      console.error(e);
      alert("❌ Gagal menyimpan:\n" + e.message);
      btn.textContent = originalLabel;
      btn.disabled    = false;
    }
  }

  // ─── Save: Jam Shift ──────────────────────────────────────
  window.saveJam = () => withLoading("saveJamBtn", "SIMPAN JAM SHIFT", async () => {
    const shifts = {
      S1:  { label:"S1",         jam: document.getElementById("jam-S1").value,  bg:"#1e3a5f", color:"#93c5fd" },
      S2:  { label:"S2",         jam: document.getElementById("jam-S2").value,  bg:"#3b1f5e", color:"#c4b5fd" },
      S2O: { label:"S2 (OFF 1)", jam: document.getElementById("jam-S2O").value, bg:"#4a2570", color:"#d8b4fe" },
      S3:  { label:"S3",         jam: document.getElementById("jam-S3").value,  bg:"#1f3b2e", color:"#86efac" },
    };
    await set(ref(db, "config/shifts"), shifts);
  });

  // ─── Save: Tanggal & Judul ────────────────────────────────
  window.saveTanggal = () => withLoading("saveTanggalBtn", "SIMPAN TANGGAL & JUDUL", async () => {
    const tanggalMulai = document.getElementById("tanggalMulai").value;
    const judul        = document.getElementById("judulInput").value.trim() || "Jadwal Kerja";
    if (!tanggalMulai) throw new Error("Tanggal mulai harus diisi!");
    await set(ref(db, "config/tanggalMulai"), tanggalMulai);
    await set(ref(db, "config/tampilan"), { judul, subjudul: "" });
  });

  // ─── Save: Hari Libur ─────────────────────────────────────
  window.saveLibur = () => withLoading("saveLiburBtn", "SIMPAN HARI LIBUR", async () => {
    const newLibur = [];
    document.querySelectorAll(".libur-cb:checked").forEach(cb => newLibur.push(cb.value));
    hariLibur = newLibur;
    await set(ref(db, "config/hariLibur"), hariLibur);
    renderJadwal(); // re-render jadwal dengan hari libur baru
  });

  // ─── Save: Jadwal karyawan ────────────────────────────────
  window.saveJadwal = () => withLoading("saveJadwalBtn", "SIMPAN JADWAL", async () => {
    const jadwal = {};
    KARYAWAN.forEach(nama => {
      jadwal[nama] = HARI_LIST.map((_, hIdx) => {
        const sel = document.querySelector(`input[name="r_${nama}_${hIdx}"]:checked`);
        return sel ? sel.value : "OFF";
      });
    });
    currentJadwal = jadwal;
    await set(ref(db, "config/jadwal"), jadwal);
  });

  // ─── Logout ───────────────────────────────────────────────
  window.doLogout = async () => {
    await signOut(auth);
    window.location.href = "index.html";
  };

  // ─── Tab navigation ───────────────────────────────────────
  window.showPage = (pageId, tabId) => {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active-tab"));
    document.getElementById(pageId).classList.add("active");
    document.getElementById(tabId).classList.add("active-tab");
  };
</script>

</body>
</html>
